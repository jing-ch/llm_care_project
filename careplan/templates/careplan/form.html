<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Care Plan Generator</title>
  <style>
    body { font-family: sans-serif; max-width: 640px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.25rem; }
    label { display: block; margin-top: 0.75rem; font-weight: 600; }
    input, textarea { width: 100%; padding: 0.4rem; box-sizing: border-box; }
    textarea { min-height: 80px; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; cursor: pointer; }
    .result { margin-top: 1.5rem; padding: 1rem; background: #f0f0f0; white-space: pre-wrap; }
    .loading { color: #666; }
    .error { color: #c00; }
    .search-item { padding: 0.5rem; border: 1px solid #ddd; margin-bottom: 0.25rem; }
    .search-item a { margin-right: 0.75rem; }
    .status-badge { font-weight: bold; }
    .status-pending { color: #888; }
    .status-processing { color: #f90; }
    .status-completed { color: #080; }
    .status-failed { color: #c00; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
{% verbatim %}
    const { useState, useEffect, useRef, useCallback } = React;

    // ── Polling hook ──────────────────────────────────────────────────────────
    // Starts at 1 s, doubles each interval (cap 30 s), stops after 2 min total.
    function useCarePlanPolling(carePlanId, onDone) {
      const timerRef    = useRef(null);
      const startRef    = useRef(null);
      const intervalRef = useRef(1000);
      const MAX_TOTAL_MS = 2 * 60 * 1000; // 2 minutes

      const stop = useCallback(() => {
        if (timerRef.current) {
          clearTimeout(timerRef.current);
          timerRef.current = null;
        }
      }, []);

      const poll = useCallback(async () => {
        const elapsed = Date.now() - startRef.current;
        if (elapsed >= MAX_TOTAL_MS) {
          onDone({ status: 'timeout' });
          return;
        }

        try {
          const res  = await fetch(`/api/careplan/${carePlanId}/status/`);
          const data = await res.json();

          if (data.status === 'completed' || data.status === 'failed') {
            onDone(data);
            return;
          }
          // still pending / processing → schedule next poll with backoff
          intervalRef.current = Math.min(intervalRef.current * 2, 30000);
          timerRef.current = setTimeout(poll, intervalRef.current);
        } catch {
          intervalRef.current = Math.min(intervalRef.current * 2, 30000);
          timerRef.current = setTimeout(poll, intervalRef.current);
        }
      }, [carePlanId, onDone]);

      useEffect(() => {
        if (!carePlanId) return;
        startRef.current   = Date.now();
        intervalRef.current = 1000;
        timerRef.current   = setTimeout(poll, 1000); // first poll after 1 s
        return stop;
      }, [carePlanId, poll, stop]);
    }

    // ── SearchSection ─────────────────────────────────────────────────────────
    function SearchSection({ onView }) {
      const [q, setQ]           = useState('');
      const [results, setResults] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError]   = useState(null);

      async function handleSearch() {
        setLoading(true); setError(null);
        try {
          const res  = await fetch('/api/careplan/search/?q=' + encodeURIComponent(q));
          const data = await res.json();
          setResults(data.results || []);
        } catch (e) {
          setError('Search failed: ' + e.message);
        } finally {
          setLoading(false);
        }
      }

      return (
        <div style={{ marginBottom: '1.5rem' }}>
          <label>Search care plans</label>
          <div style={{ display: 'flex', gap: '0.5rem', marginTop: '0.25rem' }}>
            <input
              type="text"
              value={q}
              onChange={e => setQ(e.target.value)}
              onKeyDown={e => e.key === 'Enter' && handleSearch()}
              placeholder="Patient name or content..."
              style={{ flex: 1 }}
            />
            <button type="button" onClick={handleSearch}>Search</button>
          </div>
          {loading && <p className="loading">Searching…</p>}
          {error   && <p className="error">{error}</p>}
          {results !== null && results.length === 0 && <p>No care plans found.</p>}
          {results && results.map(cp => {
            const name = `${cp.patient_first_name || ''} ${cp.patient_last_name || ''}`.trim();
            return (
              <div key={cp.id} className="search-item">
                ID: {cp.id} — {name}
                {' '}
                <a href="#" onClick={e => { e.preventDefault(); onView(cp.id); }}>View</a>
                <a href={`/api/careplan/${cp.id}/download/`} download>Download</a>
              </div>
            );
          })}
        </div>
      );
    }

    // ── StatusDisplay ─────────────────────────────────────────────────────────
    function StatusDisplay({ carePlanId }) {
      const [result, setResult] = useState(null); // null = still polling

      const handleDone = useCallback(data => setResult(data), []);
      useCarePlanPolling(carePlanId, handleDone);

      if (!result) {
        return (
          <div className="result">
            <p>
              Care Plan ID: <strong>{carePlanId}</strong>
            </p>
            <p className="loading">⏳ Generating care plan… checking every few seconds.</p>
          </div>
        );
      }

      if (result.status === 'completed') {
        return (
          <div className="result">
            <p>
              Care Plan ID: <strong>{carePlanId}</strong>{' '}
              <span className="status-badge status-completed">✅ Completed</span>
            </p>
            <pre>{result.content}</pre>
            <a href={`/api/careplan/${carePlanId}/download/`} download>Download</a>
          </div>
        );
      }

      if (result.status === 'failed') {
        return (
          <div className="result">
            <p>
              Care Plan ID: <strong>{carePlanId}</strong>{' '}
              <span className="status-badge status-failed">❌ Failed</span>
            </p>
            <p className="error">Care plan generation failed. Please try again.</p>
          </div>
        );
      }

      // timeout
      return (
        <div className="result">
          <p>
            Care Plan ID: <strong>{carePlanId}</strong>
          </p>
          <p className="error">
            Still processing after 2 minutes. The care plan may complete later — note your ID and check back.
          </p>
        </div>
      );
    }

    // ── GenerateForm ──────────────────────────────────────────────────────────
    const FIELDS = [
      { name: 'patient_first_name',      label: 'Patient First Name',                  type: 'text'     },
      { name: 'patient_last_name',       label: 'Patient Last Name',                   type: 'text'     },
      { name: 'referring_provider',      label: 'Referring Provider',                  type: 'text'     },
      { name: 'referring_provider_npi',  label: 'Referring Provider NPI (10 digits)', type: 'text'     },
      { name: 'patient_mrn',             label: 'Patient MRN',                         type: 'text'     },
      { name: 'patient_primary_diagnosis', label: 'Patient Primary Diagnosis (ICD-10)', type: 'text'   },
      { name: 'medication_name',         label: 'Medication Name',                     type: 'text'     },
      { name: 'additional_diagnoses',    label: 'Additional Diagnoses (ICD-10, comma-separated)', type: 'text' },
      { name: 'medication_history',      label: 'Medication History',                  type: 'textarea' },
      { name: 'patient_records',         label: 'Patient Records (text)',              type: 'textarea' },
    ];

    function GenerateForm({ onSubmitted }) {
      const [fields, setFields]   = useState(() =>
        Object.fromEntries(FIELDS.map(f => [f.name, '']))
      );
      const [submitting, setSubmitting] = useState(false);
      const [error, setError]     = useState(null);

      function handleChange(e) {
        setFields(prev => ({ ...prev, [e.target.name]: e.target.value }));
      }

      async function handleSubmit(e) {
        e.preventDefault();
        setSubmitting(true); setError(null);
        try {
          const res  = await fetch('/api/generate-careplan/', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(fields),
          });
          const data = await res.json();
          if (!res.ok) throw new Error(data.error || 'Server error');
          onSubmitted(data.care_plan_id);
        } catch (e) {
          setError('Submission failed: ' + e.message);
        } finally {
          setSubmitting(false);
        }
      }

      return (
        <form onSubmit={handleSubmit}>
          {FIELDS.map(f => (
            <div key={f.name}>
              <label>{f.label}</label>
              {f.type === 'textarea'
                ? <textarea name={f.name} value={fields[f.name]} onChange={handleChange} />
                : <input type="text" name={f.name} value={fields[f.name]} onChange={handleChange} />
              }
            </div>
          ))}
          {error && <p className="error">{error}</p>}
          <button type="submit" disabled={submitting}>
            {submitting ? 'Submitting…' : 'Generate Care Plan'}
          </button>
        </form>
      );
    }

    // ── App ───────────────────────────────────────────────────────────────────
    function App() {
      const [activePlanId, setActivePlanId] = useState(null);

      async function handleView(id) {
        setActivePlanId(id);
        // Jump straight to result — the status endpoint will return completed
        // immediately for already-finished plans.
        window.scrollTo(0, document.body.scrollHeight);
      }

      return (
        <div>
          <h1>Care Plan Generator</h1>
          <SearchSection onView={handleView} />
          <GenerateForm onSubmitted={id => setActivePlanId(id)} />
          {activePlanId && (
            <StatusDisplay key={activePlanId} carePlanId={activePlanId} />
          )}
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
{% endverbatim %}
  </script>
</body>
</html>
